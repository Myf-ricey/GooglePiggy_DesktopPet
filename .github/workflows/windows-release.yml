name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Prepare assets and validate
        run: |
          python tools/prepare_effect_assets.py
          python pig_pet.py --qa-only
          python tools/smoke_test.py

      - name: Build portable folder
        run: python -m PyInstaller --noconfirm --clean pig_pet.spec

      - name: Create ZIP
        shell: powershell
        run: Compress-Archive -Path "dist/GifPigDesktopPet/*" -DestinationPath "dist/GifPigDesktopPet-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: GifPigDesktopPet-windows-x64
          path: dist/GifPigDesktopPet-windows-x64.zip

      - name: Attach ZIP to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GifPigDesktopPet-windows-x64.zip
